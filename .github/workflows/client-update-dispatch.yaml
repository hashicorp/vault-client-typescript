name: Client Update Dispatch

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  dispatch-client-update-event:
    # only run if the PR was merged AND had the 'automated-spec-update' label
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'automated-spec-update')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger action in Vault Enterprise to bump client version
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ secrets.SPEC_AUTOMATION_TOKEN }}
          repository: hashicorp/vault-enterprise
          event-type: vct-update
